<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SEO Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-lg">

        <div id="form-wrapper">
            <h1 class="text-3xl font-extrabold text-center text-gray-900 mb-2">AI SEO Optimizer</h1>
            <p class="text-center text-gray-500 mb-8">Paste your target URL below for a complete AI-driven metadata audit.</p>

            <form id="audit-form" action="/analyze" method="POST" class="space-y-6">
                <div>
                    <label for="website" class="block text-sm font-medium text-gray-700 mb-1">Target URL</label>
                    <input type="url" name="website" id="website" placeholder="https://www.apple.com" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition duration-300">
                    Generate Audit
                </button>
            </form>
        </div>

        <div id="loading-container" class="hidden text-center py-10">
            <svg class="animate-spin h-10 w-10 text-blue-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <h2 class="text-xl font-bold text-gray-900 mb-2">Analyzing Website</h2>
            <p class="text-gray-500">Crawling metadata and running AI audit...<br>Please wait up to 15 seconds.</p>
        </div>

    </div>

    <script>
        // Listen for the form submission
        document.getElementById("audit-form").addEventListener("submit", function() {
            // 1. Hide the form wrapper
            document.getElementById("form-wrapper").classList.add("hidden");
            // 2. Unhide the loading container
            document.getElementById("loading-container").classList.remove("hidden");
        });
    </script>
</body>
</html>
